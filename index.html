<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Nearmap Demo</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link
      rel="icon"
      href="files/favicon_white.svg"
      type="image/svg+xml"
      media="(prefers-color-scheme: dark)"
    />
    <link
      rel="icon"
      href="files/favicon.svg"
      type="image/svg+xml"
      media="(prefers-color-scheme: light)"
    />
    <link rel="stylesheet" type="text/css" href="files/main.css" />
    <style>
      #galleryTooltip {
        position: fixed;
        z-index: 10001;
        max-width: 280px;
        max-height: 70vh;
        overflow-y: auto;
        padding: 8px 12px;
        font-size: 13px;
        line-height: 1.4;
        color: var(--text-color);
        background: var(--secondary-background-color);
        border: var(--border-style);
        border-radius: 4px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.1s ease;
      }
      #galleryTooltip.visible {
        opacity: 1;
      }

      /* Scrolling navigation banner */
      #scrollBanner {
        position: relative;
        z-index: 10;
        overflow: hidden;
        white-space: nowrap;
        background: transparent;
        height: 28px;
        display: flex;
        align-items: center;
        flex-shrink: 0;
      }
      #scrollBanner.hidden {
        display: none;
      }
      #scrollBannerText {
        display: inline-block;
        padding-left: 100%;
        animation: scrollBanner 18s linear infinite;
        font-family: 'Roboto Mono', monospace;
        font-size: 13px;
        font-weight: 400;
        color: #fff;
        letter-spacing: 0.5px;
      }
      @keyframes scrollBanner {
        0%   { transform: translateX(0); }
        100% { transform: translateX(-100%); }
      }
      #scrollBannerClose {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: rgba(255,255,255,0.6);
        font-size: 18px;
        cursor: pointer;
        padding: 2px 6px;
        line-height: 1;
        z-index: 1;
      }
      #scrollBannerClose:hover {
        color: #fff;
      }
      @media (prefers-color-scheme: light) {
        #scrollBannerText {
          color: var(--secondary-text-color);
        }
        #scrollBannerClose {
          color: var(--secondary-text-color);
        }
        #scrollBannerClose:hover {
          color: var(--text-color);
        }
      }
    </style>

    <!-- Google tag (gtag.js) -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-ZY8MG5QH3K"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-ZY8MG5QH3K");
    </script>
  </head>
  <body>
    <div id="panel">
      <div id="header">
        <div id="mobileHomeButton" data-tooltip="Home" aria-label="Go to home"></div>
        <h1><a href="index.html" id="homeLink">Nearmap Demo</a></h1>

        <div id="sections">
          <a href="index.html"></a>
          <span class="selected">examples</span>
        </div>

        <div id="settingsButton" data-tooltip="Settings"></div>
        <div id="panelToggle" data-tooltip="Expand sidebar"></div>
      </div>

      <div id="panelScrim"></div>

      <div id="collapsedStrip">
        <div id="collapsedCategories"></div>
      </div>
      <div id="collapsedFlyout">
        <div id="collapsedFlyoutTitle"></div>
        <div id="collapsedFlyoutList"></div>
      </div>

      <div id="contentWrapper">
        <div id="inputWrapper">
          <input
            placeholder="Search examples..."
            type="text"
            id="filterInput"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
          />
          <div id="exitSearchButton"></div>
        </div>
        <div id="filterCount"></div>

        <div id="content">
          <img
            id="previewsToggler"
            src="examples/files/thumbnails.svg"
            width="20"
            height="20"
          />
        </div>
      </div>

      <div id="settingsPanel">
        <div id="settingsPanelHeader">
          <h3>Settings</h3>
          <div id="settingsCloseButton"></div>
        </div>
        <div id="settingsPanelContent">
          <div class="settings-group">
            <label class="settings-toggle">
              <input type="checkbox" id="settingSearchBar" checked />
              <span class="settings-toggle-slider"></span>
              <span class="settings-toggle-label">Search bar</span>
            </label>
          </div>
          <div class="settings-group settings-desktop-only">
            <label class="settings-toggle">
              <input type="checkbox" id="settingSidebarMinimized" />
              <span class="settings-toggle-slider"></span>
              <span class="settings-toggle-label">Minimized sidebar by default</span>
            </label>
          </div>
          <div class="settings-group">
            <div class="settings-group-title">Categories in sidebar</div>
            <div class="settings-toggle-all-row">
              <button type="button" class="settings-toggle-all-btn" id="settingsSelectAll">Select all</button>
              <button type="button" class="settings-toggle-all-btn" id="settingsDeselectAll">Deselect all</button>
            </div>
            <div id="settingsCategoryToggles"></div>
          </div>
        </div>
      </div>
    </div>

    <div id="viewerWrapper">
      <div id="scrollBanner">
        <div id="scrollBannerText">Welcome to the NP Demo Gallery — NOTE: Please use the sidebar for navigation to demo pages</div>
        <button id="scrollBannerClose" aria-label="Close banner">&times;</button>
      </div>
      <iframe
        id="viewer"
        name="viewer"
        allow="fullscreen; xr-spatial-tracking;"
      ></iframe>
    </div>

    <a id="button" target="_blank"
      ><img src="files/ic_code_black_24dp.svg"
    /></a>

    <div id="galleryTooltip" role="tooltip" aria-hidden="true"></div>

    <script>
      const panel = document.getElementById("panel");
      const content = document.getElementById("content");
      const viewer = document.getElementById("viewer");
      const filterInput = document.getElementById("filterInput");
      const exitSearchButton = document.getElementById("exitSearchButton");
      const panelToggle = document.getElementById("panelToggle");
      const settingsButton = document.getElementById("settingsButton");
      const settingsPanel = document.getElementById("settingsPanel");
      const settingsCloseButton = document.getElementById("settingsCloseButton");
      const settingSearchBar = document.getElementById("settingSearchBar");
      const settingSidebarMinimized = document.getElementById("settingSidebarMinimized");
      const settingsCategoryToggles = document.getElementById("settingsCategoryToggles");
      const inputWrapper = document.getElementById("inputWrapper");
      const collapsedStrip = document.getElementById("collapsedStrip");
      const collapsedCategories = document.getElementById("collapsedCategories");
      const collapsedFlyout = document.getElementById("collapsedFlyout");
      const collapsedFlyoutTitle = document.getElementById("collapsedFlyoutTitle");
      const collapsedFlyoutList = document.getElementById("collapsedFlyoutList");
      const categoryFiles = {};
      const viewSrcButton = document.getElementById("button");
      const panelScrim = document.getElementById("panelScrim");
      const previewsToggler = document.getElementById("previewsToggler");

      const sectionLink = document.querySelector("#sections > a");
      const sectionDefaultHref = sectionLink.href;

      const links = {};
      const validRedirects = new Map();
      const container = document.createElement("div");
      let displayNames = {};
      let descriptions = {};

      const categoryShortNames = {
        "Arcgis Javascript SDK": "ArcGIS",
        "3D Mesh": "3D Mesh",
        "Transactional API": "TX API",
        "Custom Nearmap Widget": "Widgets",
        "Video Gallery": "Videos",
        "Video Renders": "Renders",
        "Engineering Design": "Engineering",
        "Archived": "Archive"
      };

      const SETTINGS_KEY = "gallerySettings";
      const DEFAULT_SETTINGS = {
        searchBar: true,
        sidebarMinimizedByDefault: false,
        categories: {} // populated per-category, true = visible
      };

      let selected = null;

      function getSettings() {
        try {
          const stored = localStorage.getItem(SETTINGS_KEY);
          if (stored) {
            return JSON.parse(stored);
          }
        } catch (e) {}
        return null;
      }

      function getCategorySettings(files) {
        const s = getSettings();
        const cats = s && s.categories ? s.categories : {};
        const out = {};
        for (const key in files) {
          out[key] = cats[key] !== false; // default true
        }
        return out;
      }

      function saveSettings(settings) {
        try {
          localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
        } catch (e) {}
      }

      function buildSettingsCategoryToggles(files) {
        const categorySettings = getCategorySettings(files);
        settingsCategoryToggles.innerHTML = "";
        for (const key in files) {
          const label = document.createElement("label");
          label.className = "settings-category-toggle";
          const cb = document.createElement("input");
          cb.type = "checkbox";
          cb.checked = categorySettings[key] !== false;
          cb.setAttribute("data-category", key);
          const slider = document.createElement("span");
          slider.className = "settings-toggle-slider";
          const text = document.createElement("span");
          text.className = "settings-toggle-label";
          text.textContent = categoryShortNames[key] || key;
          label.appendChild(cb);
          label.appendChild(slider);
          label.appendChild(text);
          cb.addEventListener("change", function () {
            const s = getSettings() || { searchBar: true, categories: {} };
            s.categories = s.categories || {};
            s.categories[key] = cb.checked;
            saveSettings(s);
            applySettings(files);
          });
          settingsCategoryToggles.appendChild(label);
        }
      }

      function applySettings(files) {
        const s = getSettings();
        const searchBarOn = !s ? true : s.searchBar !== false;
        const sidebarMinimized = s && s.sidebarMinimizedByDefault === true;
        const categorySettings = getCategorySettings(files);

        inputWrapper.style.display = searchBarOn ? "" : "none";
        settingSearchBar.checked = searchBarOn;
        settingSidebarMinimized.checked = sidebarMinimized;

        const headers = container.querySelectorAll("h2[data-category]");
        headers.forEach(function (h2) {
          const cat = h2.getAttribute("data-category");
          const visible = categorySettings[cat] !== false;
          h2.classList.toggle("settings-hidden", !visible);
          let el = h2.nextElementSibling;
          while (el && el.tagName !== "H2") {
            el.classList.toggle("settings-hidden", !visible);
            el = el.nextElementSibling;
          }
        });

        document.querySelectorAll(".collapsed-pill").forEach(function (pill) {
          const cat = pill.getAttribute("data-category");
          pill.style.display = categorySettings[cat] !== false ? "" : "none";
        });
      }

      const isIOS = /(iPad|iPhone|iPod)/g.test(navigator.userAgent);

      function showHome() {
        selected = null;
        document.body.classList.add("home");
        if (Object.keys(links).length) {
          Object.keys(links).forEach(function (f) { links[f].classList.remove("selected"); });
        }
        window.history.replaceState({}, "", window.location.pathname + window.location.search);
        viewer.removeAttribute("srcdoc");
        viewer.src = "examples/home.html";
        viewer.style.display = "unset";
        if (isIOS) viewer.removeAttribute("scrolling");
      }

      init();

      async function init() {
        content.appendChild(container);

        viewSrcButton.style.display = "none";

        const [filesRes, tagsRes, namesRes, descRes] = await Promise.all([
          fetch("examples/files.json"),
          fetch("examples/tags.json"),
          fetch("examples/display-names.json").catch(() => null),
          fetch("examples/descriptions.json").catch(() => null)
        ]);
        const files = await filesRes.json();
        const tags = await tagsRes.json();
        descriptions = (descRes && descRes.ok) ? await descRes.json() : {};
        if (namesRes && namesRes.ok) displayNames = await namesRes.json();

        for (const key in files) {
          const category = files[key];

          const header = document.createElement("h2");
          header.textContent = categoryShortNames[key] || key;
          header.setAttribute("data-category", key);
          container.appendChild(header);

          categoryFiles[key] = category.slice();

          const collapsedPill = document.createElement("div");
          collapsedPill.className = "collapsed-pill";
          const shortName = categoryShortNames[key] || key;
          collapsedPill.textContent = shortName.length > 6 ? shortName.slice(0, 6) : shortName;
          collapsedPill.setAttribute("data-category", key);
          collapsedPill.title = categoryShortNames[key] || key;
          collapsedCategories.appendChild(collapsedPill);

          for (let i = 0; i < category.length; i++) {
            const file = category[i];

            const link = createLink(file, tags[file]);
            container.appendChild(link);

            links[file] = link;
            validRedirects.set(file, file + ".html");
          }
        }

        buildSettingsCategoryToggles(files);
        applySettings(files);

        if (window.location.hash !== "") {
          const file = window.location.hash.substring(1);

          // use a predefined map of redirects to avoid untrusted URL redirection due to user-provided value

          if (validRedirects.has(file) === true) {
            selectFile(file);
            viewer.src = "examples/" + file + ".html";
            viewer.style.display = "unset";
          } else {
            showHome();
          }
        } else {
          showHome();
        }

        filterInput.value = extractQuery();

        if (filterInput.value !== "") {
          panel.classList.add("searchFocused");

          updateFilter(files, tags);
        } else {
          updateLink("");
        }

        // Events

        filterInput.onfocus = function () {
          panel.classList.add("searchFocused");
        };

        filterInput.onblur = function () {
          if (filterInput.value === "") {
            panel.classList.remove("searchFocused");
          }
        };

        exitSearchButton.onclick = function () {
          filterInput.value = "";
          updateFilter(files, tags);
          panel.classList.remove("searchFocused");
        };

        let filterTimeout;
        filterInput.addEventListener("input", function () {
          clearTimeout(filterTimeout);
          filterTimeout = setTimeout(() => updateFilter(files, tags), 150);
        });
        filterInput.addEventListener("keydown", function (e) {
          if (e.key === "Enter") {
            clearTimeout(filterTimeout);
            updateFilter(files, tags);
          }
        });

        document.getElementById("homeLink").addEventListener("click", function (e) {
          if (e.button === 0 && !e.ctrlKey && !e.altKey && !e.metaKey) {
            e.preventDefault();
            showHome();
          }
        });

        document.getElementById("mobileHomeButton").addEventListener("click", function (e) {
          e.preventDefault();
          if (window.hideGalleryTooltip) window.hideGalleryTooltip();
          collapsedFlyout.classList.remove("open");
          showHome();
        });

        window.addEventListener("message", function (e) {
          if (e.data && e.data.type === "galleryNavigate" && e.data.hash && validRedirects.has(e.data.hash)) {
            var linkAnchor = links[e.data.hash] ? links[e.data.hash].querySelector('a[target="viewer"]') : null;
            if (linkAnchor) linkAnchor.click();
            else {
              selectFile(e.data.hash);
              viewer.removeAttribute("srcdoc");
              viewer.src = "examples/" + e.data.hash + ".html";
              viewer.style.display = "unset";
            }
          }
        });

        function updatePanelToggleTooltip() {
          if (window.innerWidth <= 640) {
            panelToggle.setAttribute("data-tooltip", panel.classList.contains("open") ? "Close sidebar" : "Open sidebar");
          } else {
            panelToggle.setAttribute("data-tooltip", panel.classList.contains("collapsed") ? "Expand sidebar" : "Minimize sidebar");
          }
        }

        panelToggle.addEventListener("click", function (event) {
          event.preventDefault();
          if (window.hideGalleryTooltip) window.hideGalleryTooltip();
          if (window.innerWidth <= 640) return;
          panel.classList.toggle("collapsed");
          localStorage.setItem("panelCollapsed", panel.classList.contains("collapsed"));
          if (!panel.classList.contains("collapsed")) collapsedFlyout.classList.remove("open");
          updatePanelToggleTooltip();
        });

        collapsedCategories.addEventListener("click", function (e) {
          if (!e.target.classList.contains("collapsed-pill")) return;
          if (window.hideGalleryTooltip) window.hideGalleryTooltip();
          const cat = e.target.getAttribute("data-category");
          const filesInCat = categoryFiles[cat] || [];
          if (filesInCat.length === 0) {
            panel.classList.remove("collapsed");
            localStorage.setItem("panelCollapsed", "false");
            return;
          }
          const isOpen = collapsedFlyout.classList.contains("open") && collapsedFlyout.dataset.category === cat;
          if (isOpen) {
            collapsedFlyout.classList.remove("open");
            collapsedFlyout.dataset.category = "";
            return;
          }
          collapsedFlyoutTitle.textContent = cat;
          collapsedFlyoutList.innerHTML = "";
          filesInCat.forEach(function (file) {
            const a = document.createElement("a");
            a.href = "examples/" + file + ".html";
            a.target = "viewer";
            a.className = "collapsed-flyout-item";
            a.textContent = getName(file);
            a.setAttribute("data-tooltip", getTooltipText(file, tags[file] || []));
            a.title = "";
            a.addEventListener("click", function (ev) {
              ev.preventDefault();
              ev.stopPropagation();
              if (window.hideGalleryTooltip) window.hideGalleryTooltip();
              collapsedFlyout.classList.remove("open");
              var linkAnchor = links[file] ? links[file].querySelector('a[target="viewer"]') : null;
              if (linkAnchor) {
                linkAnchor.click();
              } else {
                viewer.removeAttribute("srcdoc");
                viewer.src = new URL("examples/" + file + ".html", window.location.href).href;
                selectFile(file);
              }
            });
            collapsedFlyoutList.appendChild(a);
          });
          collapsedFlyout.dataset.category = cat;
          collapsedFlyout.classList.add("open");
        });

        document.addEventListener("click", function (e) {
          if (collapsedFlyout.classList.contains("open") &&
              !collapsedFlyout.contains(e.target) &&
              !e.target.classList.contains("collapsed-pill")) {
            if (window.hideGalleryTooltip) window.hideGalleryTooltip();
            collapsedFlyout.classList.remove("open");
          }
        });

        panelScrim.onclick = function (event) {
          event.preventDefault();
          if (window.innerWidth > 640) {
            panel.classList.toggle("open");
          }
        };

        settingsButton.addEventListener("click", function (e) {
          e.preventDefault();
          if (window.hideGalleryTooltip) window.hideGalleryTooltip();
          settingsPanel.classList.add("open");
        });
        settingsCloseButton.addEventListener("click", function (e) {
          e.preventDefault();
          settingsPanel.classList.remove("open");
        });
        settingSearchBar.addEventListener("change", function () {
          const s = getSettings() || { searchBar: true, categories: {} };
          s.searchBar = settingSearchBar.checked;
          saveSettings(s);
          applySettings(files);
        });
        settingSidebarMinimized.addEventListener("change", function () {
          const s = getSettings() || { searchBar: true, categories: {} };
          s.sidebarMinimizedByDefault = settingSidebarMinimized.checked;
          saveSettings(s);
          localStorage.setItem("panelCollapsed", settingSidebarMinimized.checked ? "true" : "false");
          if (window.innerWidth > 640) {
            panel.classList.toggle("collapsed", settingSidebarMinimized.checked);
            updatePanelToggleTooltip();
          }
        });

        document.getElementById("settingsSelectAll").addEventListener("click", function () {
          const s = getSettings() || { searchBar: true, categories: {} };
          s.categories = s.categories || {};
          for (const key in files) s.categories[key] = true;
          saveSettings(s);
          buildSettingsCategoryToggles(files);
          applySettings(files);
        });
        document.getElementById("settingsDeselectAll").addEventListener("click", function () {
          const s = getSettings() || { searchBar: true, categories: {} };
          s.categories = s.categories || {};
          for (const key in files) s.categories[key] = false;
          saveSettings(s);
          buildSettingsCategoryToggles(files);
          applySettings(files);
        });

        if (window.innerWidth <= 640) {
          panel.classList.add("collapsed");
        } else {
          const s = getSettings();
          const useSetting = s && "sidebarMinimizedByDefault" in s;
          const sidebarMinimized = useSetting ? s.sidebarMinimizedByDefault === true : localStorage.getItem("panelCollapsed") === "true";
          if (sidebarMinimized) panel.classList.add("collapsed");
        }

        updatePanelToggleTooltip();

        window.addEventListener("resize", function () {
          if (window.innerWidth <= 640) {
            panel.classList.add("collapsed");
            panel.classList.remove("open");
          }
          updatePanelToggleTooltip();
        });

        previewsToggler.onclick = function (event) {
          event.preventDefault();
          content.classList.toggle("minimal");
        };

        // iOS iframe auto-resize workaround: set explicit pixel dimensions to prevent
        // iframe from auto-expanding to content height (which breaks layout).
        // Do NOT set scrolling="no" - that prevents users from scrolling example pages on mobile.
        if (isIOS) {
          viewer.style.width = getComputedStyle(viewer).width;
          viewer.style.height = getComputedStyle(viewer).height;
        }

        // Fast tooltip (150ms delay vs ~1s for native title)
        setupFastTooltip();

        // Scrolling navigation banner
        const scrollBanner = document.getElementById("scrollBanner");
        const scrollBannerClose = document.getElementById("scrollBannerClose");
        if (localStorage.getItem("scrollBannerDismissed") === "true") {
          scrollBanner.classList.add("hidden");
        }
        scrollBannerClose.addEventListener("click", function () {
          scrollBanner.classList.add("hidden");
          localStorage.setItem("scrollBannerDismissed", "true");
        });
      }

      function setupFastTooltip() {
        const tooltipEl = document.getElementById("galleryTooltip");
        const TOOLTIP_DELAY = 150;
        let showTimer = null;
        let currentTarget = null;

        function showTooltip(el, text) {
          tooltipEl.textContent = text;
          tooltipEl.classList.add("visible");
          tooltipEl.setAttribute("aria-hidden", "false");

          const rect = el.getBoundingClientRect();
          const padding = 8;
          const gap = 8;
          const tw = tooltipEl.offsetWidth;
          const th = tooltipEl.offsetHeight;

          // Prefer right of element (sidebar is on left, so space to the right)
          let left = rect.right + gap;
          let top = rect.top + (rect.height / 2) - (th / 2);

          const maxLeft = window.innerWidth - tw - padding;
          const minLeft = padding;
          const minTop = padding;
          const maxTop = window.innerHeight - th - padding;

          if (left + tw > window.innerWidth - padding) {
            left = rect.left - tw - gap;
          }
          if (left < minLeft) {
            left = minLeft;
          }
          left = Math.max(minLeft, Math.min(left, maxLeft));
          top = Math.max(minTop, Math.min(top, maxTop));

          tooltipEl.style.left = left + "px";
          tooltipEl.style.top = top + "px";
        }

        function hideTooltip() {
          if (showTimer) {
            clearTimeout(showTimer);
            showTimer = null;
          }
          currentTarget = null;
          tooltipEl.classList.remove("visible");
          tooltipEl.setAttribute("aria-hidden", "true");
        }
        window.hideGalleryTooltip = hideTooltip;

        panel.addEventListener("mouseover", function (e) {
          const el = e.target.closest("[data-tooltip]");
          if (!el) {
            if (!panel.contains(e.relatedTarget)) hideTooltip();
            return;
          }
          if (el === currentTarget) return;
          hideTooltip();
          currentTarget = el;
          const text = el.getAttribute("data-tooltip");
          if (!text) return;
          showTimer = setTimeout(() => showTooltip(el, text), TOOLTIP_DELAY);
        });

        panel.addEventListener("mouseout", function (e) {
          if (!panel.contains(e.relatedTarget)) hideTooltip();
        });
      }

      function getTooltipText(file, tags) {
        const desc = descriptions[file] || getName(file) + " demo.";
        const tagList = Array.isArray(tags) && tags.length
          ? tags.filter(t => t.length > 1).join(", ")
          : "";
        return tagList ? `${desc} Tags: ${tagList}` : desc;
      }

      function escapeAttr(s) {
        return String(s).replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
      }

      function createLink(file, tags) {
        const external =
          Array.isArray(tags) && tags.includes("external")
            ? ' <span class="tag">external</span>'
            : "";

        const tooltip = escapeAttr(getTooltipText(file, tags));

        const template = `
				<div class="card" data-tooltip="${tooltip}" title="">
					<a href="examples/${file}.html" target="viewer" data-tooltip="${tooltip}" title="">
						<div class="cover">
							<img src="examples/screenshots/${file}.jpg" loading="lazy" width="400" />
						</div>
						<div class="title">${getName(file)}${external}</div>
					</a>
				</div>
			`;

        const link = createElementFromHTML(template);

        link
          .querySelector('a[target="viewer"]')
          .addEventListener("click", function (event) {
            if (
              event.button !== 0 ||
              event.ctrlKey ||
              event.altKey ||
              event.metaKey
            )
              return;

            selectFile(file);
          });

        return link;
      }

      function selectFile(file) {
        document.body.classList.remove("home");
        if (selected !== null) links[selected].classList.remove("selected");

        links[file].classList.add("selected");

        window.location.hash = file;
        viewer.focus();
        viewer.style.display = "unset";
        // Allow iframe to scroll - scrolling="no" was blocking scroll on mobile
        if (isIOS) viewer.removeAttribute("scrolling");

        collapsedFlyout.classList.remove("open");

        selected = file;

        // Reveal "View source" button and set attributes to this example
        // viewSrcButton.style.display = '';
        // viewSrcButton.href = 'https://github.com/mrdoob/three.js/blob/master/examples/' + selected + '.html';
        // viewSrcButton.title = 'View source code for ' + getName( selected ) + ' on GitHub';
      }

      function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); // https://stackoverflow.com/a/6969486/5250847
      }

      function updateFilter(files, tags) {
        let v = filterInput.value.trim();
        v = v.replace(/\s+/gi, " "); // replace multiple whitespaces with a single one

        if (v !== "") {
          window.history.replaceState({}, "", "?q=" + v + window.location.hash);
        } else {
          window.history.replaceState(
            {},
            "",
            window.location.pathname + window.location.hash
          );
        }

        const exp = new RegExp(escapeRegExp(v), "gi");

        let total = 0;
        let visible = 0;

        for (const key in files) {
          const section = files[key];

          for (let i = 0; i < section.length; i++) {
            total++;
            if (filterExample(section[i], exp, tags)) visible++;
          }
        }

        layoutList(files);

        const filterCount = document.getElementById("filterCount");
        if (v !== "") {
          filterCount.textContent = "Showing " + visible + " of " + total + " examples";
          filterCount.classList.add("visible");
        } else {
          filterCount.textContent = "";
          filterCount.classList.remove("visible");
        }

        updateLink(v);
      }

      function updateLink(search) {
        // update docs link

        if (search) {
          const link = sectionLink.href.split(/[?#]/)[0];
          sectionLink.href = `${link}?q=${search}`;
        } else {
          sectionLink.href = sectionDefaultHref;
        }
      }

      function filterExample(file, exp, tags) {
        const link = links[file];
        const name = getName(file);
        if (file in tags) file += " " + tags[file].join(" ");
        const res = file.match(exp);

        if (res && res.length > 0) {
          link.classList.remove("hidden");
          return true;
        } else {
          link.classList.add("hidden");
          return false;
        }
      }

      function getName(file) {
        if (displayNames[file]) return displayNames[file];
        const parts = file.split("_");
        parts.shift();
        return parts.map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase()).join(" ");
      }

      function layoutList(files) {
        for (const key in files) {
          let collapsed = true;

          const section = files[key];

          for (let i = 0; i < section.length; i++) {
            const file = section[i];

            if (links[file].classList.contains("hidden") === false) {
              collapsed = false;
              break;
            }
          }

          const element = document.querySelector(
            'h2[data-category="' + key + '"]'
          );

          if (collapsed) {
            element.classList.add("hidden");
          } else {
            element.classList.remove("hidden");
          }
        }
      }

      function extractQuery() {
        const search = window.location.search;

        if (search.indexOf("?q=") !== -1) {
          return decodeURI(search.slice(3));
        }

        return "";
      }

      function createElementFromHTML(htmlString) {
        const div = document.createElement("div");
        div.innerHTML = htmlString.trim();
        return div.firstChild;
      }
    </script>
