<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js webgl - GLTFloader + compressed</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="main.css">
	</head>

	<body>
		<div id="info">
			<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - GLTFLoader + compression extensions<br />
			<a href="https://" target="_blank" rel="noopener">GLTF Mesh</a> By
			<a href="https://Nearmap.com" target="_blank" rel="noopener">Nearmap</a>
		</div>

		<!-- Import maps polyfill -->
		<!-- Remove this when import maps will be widely supported -->
		<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>

		<script type="importmap">
			{
				"imports": {
					"three": "../build/three.module.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';
			import { RoomEnvironment } from './jsm/environments/RoomEnvironment.js';
			import { OrbitControls } from './jsm/controls/OrbitControls.js';
			import { GLTFLoader } from './jsm/loaders/GLTFLoader.js';
			import { KTX2Loader } from './jsm/loaders/KTX2Loader.js';
			import { createMeshLoadingOverlay } from './jsm/loaders/MeshLoadingOverlay.js';
			
			let camera, scene, renderer, controls;
			const loadingOverlay = createMeshLoadingOverlay();

			init();

			async function init() {

				const container = document.createElement( 'div' );
				document.body.appendChild( container );

				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.toneMapping = THREE.ACESFilmicToneMapping;
				renderer.toneMappingExposure = 1;
				renderer.outputEncoding = THREE.sRGBEncoding;
				container.appendChild( renderer.domElement );

				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 0.1, 2000 );
				camera.position.set( 0, 100, 0 );

				const environment = new RoomEnvironment();
				const pmremGenerator = new THREE.PMREMGenerator( renderer );

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0xbbbbbb );
				scene.environment = pmremGenerator.fromScene( environment ).texture;
				

				const grid = new THREE.GridHelper( 500, 10, 0xffffff, 0xffffff );
				grid.material.opacity = 0.5;
				grid.material.depthWrite = false;
				grid.material.transparent = true;
				scene.add( grid );

				const ktx2Loader = new KTX2Loader()
					.setTranscoderPath( 'js/libs/basis/' )
					.detectSupport( renderer );

				const localBasePath = '../examples/models/nearmap/kew_gardens/';
				const awsS3Path = 'https://d3e0kl50ei6ri7.cloudfront.net/kew_gardens/';
				const glbFile = 'kew_gardens.glb';
				const localFileExists = await checkFileExists( localBasePath + glbFile );
				const basePath = localFileExists ? localBasePath : awsS3Path;
				const loader = new GLTFLoader().setPath( basePath );
				loader.setKTX2Loader( ktx2Loader );
				loadingOverlay.show();
				loader.load( glbFile, function ( gltf ) {
					loadingOverlay.hide();
					scene.add( gltf.scene );

					const box = new THREE.Box3().setFromObject( gltf.scene );
					const center = box.getCenter( new THREE.Vector3() );
					const size = box.getSize( new THREE.Vector3() );
					gltf.scene.position.sub( center );
					gltf.scene.position.y += 8;

					const box2 = new THREE.Box3().setFromObject( gltf.scene );
					const size2 = box2.getSize( new THREE.Vector3() );
					const maxDim = Math.max( size2.x, size2.y, size2.z ) || 1;
					const distance = Math.max( maxDim * 2.5, 150 );
					controls.target.set( 0, 8, 0 );
					camera.position.set( distance * 0.4, 8 + distance * 0.7, distance * 0.6 );
					controls.minDistance = maxDim * 0.3;
					controls.maxDistance = distance * 3;
					controls.update();
					controls.autoRotate = true;

					render();

				}, function ( xhr ) {
					if ( xhr.lengthComputable ) loadingOverlay.updateProgress( xhr.loaded, xhr.total );
					else loadingOverlay.updateProgress( xhr.loaded, 0 );
				} );

				controls = new OrbitControls( camera, renderer.domElement );
				controls.addEventListener( 'change', render );
				controls.autoRotate = false;
				controls.autoRotateSpeed = 0.4;
				controls.addEventListener( 'start', function () { controls.autoRotate = false; } );
				controls.minDistance = 50;
				controls.maxDistance = 1000;

				window.addEventListener( 'resize', onWindowResize );
				animate();

			}

			function animate() {
				requestAnimationFrame( animate );
				if ( controls ) controls.update();
				render();
			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

				render();

			}

			//

			function render() {

				renderer.render( scene, camera );

			}

			async function checkFileExists( url ) {
				try {
					const response = await fetch( url, { method: 'HEAD' } );
					return response.ok;
				} catch ( error ) {
					return false;
				}
			}

		</script>

	</body>
</html>
