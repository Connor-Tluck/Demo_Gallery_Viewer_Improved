<!DOCTYPE html>
<html style="width: 100%; height: 100%;">
  <head>
    <title>OpenLayers Nearmap Adavanced Example</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- polyfills for old browsers -->
    <script src="https://cdn.polyfill.io/v2/polyfill.min.js?features=requestAnimationFrame,Element.prototype.classList,Promise,fetch,Array.prototype.filter,Array.prototype.some,Array.prototype.find,Array.prototype.findIndex,Array.prototype.map"></script>

    <!--
      OpenLayers cdn distributable from:
      https://openlayers.org/en/latest/doc/quickstart.html
    -->
    <script src="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@main/dist/en/v7.0.0/legacy/ol.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@main/dist/en/v7.0.0/legacy/ol.css">
    

    <!-- map controls styling -->
    <style>
      #map {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        left: 0;
      }

      .heading-btn {
        position: absolute;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        z-index: 100;
      }

      .heading-btn .center {
        display: flex;
        justify-content: center;
        width: 100%;
      }

      .heading-btn button {
        padding: 10px 18px;
        margin: 0;
        border: none;
        border-radius: 8px;
        background: rgba(255,255,255,0.95);
        color: #333;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        transition: all 0.2s;
      }

      .heading-btn button:hover {
        background: #049EF4;
        color: white;
        box-shadow: 0 4px 12px rgba(4,158,244,0.4);
      }

      .survey-picker {
        position: absolute;
        bottom: 12px;
        left: 12px;
        right: 12px;
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        background: rgba(255,255,255,0.95);
        padding: 12px 16px;
        border-radius: 10px;
        box-shadow: 0 2px 12px rgba(0,0,0,0.12);
        z-index: 100;
      }

      .survey-picker > div {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .survey-picker span {
        font-size: 13px;
        font-weight: 500;
        color: #555;
      }

      .survey-picker select {
        padding: 6px 12px;
        border-radius: 6px;
        border: 1px solid #ddd;
        font-size: 13px;
        background: white;
        min-width: 140px;
      }
    </style>
  </head>

  <body>
    <div id="map"></div>
    <div class="heading-btn" >
      <div class="center"><button id="northElementId" value="North">North</button></div>
      <div>
        <button id="westElementId" value="West">West</button>
        <button id="vertElementId" value="Vert">Vertical</button>
        <button id="eastElementId" value="East">East</button>
      </div>
      <div class="center"><button id="southElementId" value="South">South</button></div>
    </div>
    <div class="survey-picker">
      <div>
        <span>Available surveys</span>
        <select></select>
      </div>
      <div >
        <span>Selected</span>
        <div id="selectedSurveyElementId"></div>
      </div>
      <div >
        <span>Displayed</span>
        <div id="displayedSurveyElementId"></div>
      </div>
    </div>

    <!-- Nearmap js files - import order is important (keys.js first for API key) -->
    <script src="./keys.js"></script>
    <script src="./nearmap_custom_js/config.js"></script>
    <script src="./nearmap_custom_js/url.js"></script>
    <script src="./nearmap_custom_js/math.js"></script>
    <script src="./nearmap_custom_js/projections.js"></script>
    <script src="./nearmap_custom_js/loader.js"></script>
    <script src="./nearmap_custom_js/index.js"></script>
  </body>
</html>
