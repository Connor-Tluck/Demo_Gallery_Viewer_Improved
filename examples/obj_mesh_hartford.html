<!DOCTYPE html>
<html lang="en">
	<head>
		<title>nearmap_demo - arcball controls</title>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"
		/>
		<link type="text/css" rel="stylesheet" href="main.css" />
	</head>

	<body>
		<div id="info">
			<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a>
			- arcball controls<br />
			<a
				href="http://www.polycount.com/forum/showthread.php?t=130641"
				target="_blank"
				rel="noopener"
				>Nearmap Demo</a
			>
			by Connor Tluck.
		</div>

		<!-- Import maps polyfill -->
		<!-- Remove this when import maps will be widely supported -->
		<script
			async
			src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"
		></script>

		<script type="importmap">
			{
				"imports": {
					"three": "../build/three.module.js"
				}
			}
		</script>

		<script type="module">
			import * as THREE from "three";

			import { GUI } from "./jsm/libs/lil-gui.module.min.js";

			import { ArcballControls } from "./jsm/controls/ArcballControls.js";

			import { OBJLoader } from "./jsm/loaders/OBJLoader.js";
			import { RGBELoader } from "./jsm/loaders/RGBELoader.js";
			import { MTLLoader } from "./jsm/loaders/MTLLoader.js";
			import { OBJExporter } from "./jsm/exporters/OBJExporter.js";
			import { createMeshLoadingOverlay } from "./jsm/loaders/MeshLoadingOverlay.js";

			const cameras = ["Orthographic", "Perspective"];
			const loadingOverlay = createMeshLoadingOverlay({ isNonGltf: true });
			const cameraType = { type: "Perspective" };

			let autoRotateGroup = null;
			let autoRotate = true;

			const perspectiveDistance = 100;
			const orthographicDistance = 1000;
			let camera, controls, scene, renderer, gui;
			let folderOptions, folderAnimations;

			const arcballGui = {
				gizmoVisible: true,

				setArcballControls: function () {
					controls = new ArcballControls(camera, renderer.domElement, scene);
					controls.addEventListener("change", render);
					controls.addEventListener("start", function () { autoRotate = false; });

					this.gizmoVisible = true;

					this.populateGui();
				},

				populateGui: function () {
					folderOptions.add(controls, "enabled").name("Enable controls");
					folderOptions.add(controls, "enableGrid").name("Enable Grid");
					folderOptions.add(controls, "enableRotate").name("Enable rotate");
					folderOptions.add(controls, "enablePan").name("Enable pan");
					folderOptions.add(controls, "enableZoom").name("Enable zoom");
					folderOptions.add(controls, "cursorZoom").name("Cursor zoom");
					folderOptions.add(controls, "adjustNearFar").name("adjust near/far");
					folderOptions
						.add(controls, "scaleFactor", 1.1, 10, 0.1)
						.name("Scale factor");
					folderOptions
						.add(controls, "minDistance", 0, 50, 0.5)
						.name("Min distance");
					folderOptions
						.add(controls, "maxDistance", 0, 50, 0.5)
						.name("Max distance");
					folderOptions.add(controls, "minZoom", 0, 50, 0.5).name("Min zoom");
					folderOptions.add(controls, "maxZoom", 0, 50, 0.5).name("Max zoom");
					folderOptions
						.add(arcballGui, "gizmoVisible")
						.name("Show gizmos")
						.onChange(function () {
							controls.setGizmosVisible(arcballGui.gizmoVisible);
						});
					folderOptions.add(controls, "copyState").name("Copy state(ctrl+c)");
					folderOptions.add(controls, "pasteState").name("Paste state(ctrl+v)");
					folderOptions.add(controls, "reset").name("Reset");
					folderAnimations
						.add(controls, "enableAnimations")
						.name("Enable anim.");
					folderAnimations
						.add(controls, "dampingFactor", 0, 100, 1)
						.name("Damping");
					folderAnimations.add(controls, "wMax", 0, 100, 1).name("Angular spd");
				},
			};

			init();

			function init() {
				const container = document.createElement("div");
				document.body.appendChild(container);

				renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
				renderer.setPixelRatio(window.devicePixelRatio);
				renderer.setSize(window.innerWidth, window.innerHeight);

				renderer.outputEncoding = THREE.sRGBEncoding;
				renderer.toneMapping = THREE.ReinhardToneMapping;
				renderer.toneMappingExposure = 3;
				renderer.domElement.style.background =
					"linear-gradient( 180deg, rgba( 0,0,0,1 ) 0%, rgba( 59,60,70 ) 100% )";
				container.appendChild(renderer.domElement);

				//

				scene = new THREE.Scene();
				scene.add(new THREE.HemisphereLight(0x443333, 0x222233, 4));

				camera = makePerspectiveCamera();
				camera.position.set(0, 0, 200);

				const material = new THREE.MeshStandardMaterial();

				loadingOverlay.show();
				new MTLLoader()
					.load("https://d3e0kl50ei6ri7.cloudfront.net/hartford/Mesh/Mesh.mtl", function (materials) {
						materials.preload();

						new OBJLoader()
							.setMaterials(materials)
							.load("https://d3e0kl50ei6ri7.cloudfront.net/hartford/Mesh/Mesh.obj", function (object) {
								loadingOverlay.hide();
								object.position.y = 0;
								object.position.x += 0.25;
								object.position.z = 0;
								autoRotateGroup = new THREE.Group();
								autoRotateGroup.add(object);
								scene.add(autoRotateGroup);
								const box = new THREE.Box3().setFromObject(autoRotateGroup);
								const center = box.getCenter(new THREE.Vector3());
								const size = box.getSize(new THREE.Vector3());
								const maxDim = Math.max(size.x, size.y, size.z) || 1;
								const distance = Math.max(maxDim * 1.6, 120);
								controls.target.copy(center);
								camera.position.set(center.x + distance * 0.5, center.y + distance * 0.6, center.z + distance * 0.5);
								controls.minDistance = maxDim * 0.4;
								controls.maxDistance = distance * 2.5;
								controls.setCamera(camera);
								render();
							});

						window.addEventListener("keydown", onKeyDown);
						window.addEventListener("resize", onWindowResize);
						render();

						//

						gui = new GUI();
						gui
							.add(cameraType, "type", cameras)
							.name("Choose Camera")
							.onChange(function () {
								setCamera(cameraType.type);
							});

						folderOptions = gui.addFolder("Arcball parameters");
						folderAnimations = folderOptions.addFolder("Animations");

						arcballGui.setArcballControls();

						animate();
						render();
					});
			}

			function animate() {
				requestAnimationFrame(animate);
				if (autoRotate && autoRotateGroup) {
					autoRotateGroup.rotation.y += 0.0004;
				}
				render();
			}

			function makeOrthographicCamera() {
				const halfFovV = THREE.MathUtils.DEG2RAD * 45 * 0.5;
				const halfFovH = Math.atan(
					(window.innerWidth / window.innerHeight) * Math.tan(halfFovV)
				);

				const halfW = perspectiveDistance * Math.tan(halfFovH);
				const halfH = perspectiveDistance * Math.tan(halfFovV);
				const near = 0.01;
				const far = 8000;
				const newCamera = new THREE.OrthographicCamera(
					-halfW,
					halfW,
					halfH,
					-halfH,
					near,
					far
				);
				return newCamera;
			}

			function makePerspectiveCamera() {
				const fov = 45;
				const aspect = window.innerWidth / window.innerHeight;
				const near = 0.01;
				const far = 8000;
				const newCamera = new THREE.PerspectiveCamera(fov, aspect, near, far);
				return newCamera;
			}

			function onWindowResize() {
				if (camera.type == "OrthographicCamera") {
					const halfFovV = THREE.MathUtils.DEG2RAD * 45 * 0.5;
					const halfFovH = Math.atan(
						(window.innerWidth / window.innerHeight) * Math.tan(halfFovV)
					);

					const halfW = perspectiveDistance * Math.tan(halfFovH);
					const halfH = perspectiveDistance * Math.tan(halfFovV);
					camera.left = -halfW;
					camera.right = halfW;
					camera.top = halfH;
					camera.bottom = -halfH;
				} else if (camera.type == "PerspectiveCamera") {
					camera.aspect = window.innerWidth / window.innerHeight;
				}

				camera.updateProjectionMatrix();

				renderer.setSize(window.innerWidth, window.innerHeight);

				render();
			}

			function render() {
				renderer.render(scene, camera);
			}

			function onKeyDown(event) {
				if (event.key === "c") {
					if (event.ctrlKey || event.metaKey) {
						controls.copyState();
					}
				} else if (event.key === "v") {
					if (event.ctrlKey || event.metaKey) {
						controls.pasteState();
					}
				}
			}

			function setCamera(type) {
				const center = controls.target.clone();
				const dist = camera.position.distanceTo(center) || 200;
				const dir = new THREE.Vector3().subVectors(camera.position, center).normalize();
				if (type == "Orthographic") {
					camera = makeOrthographicCamera();
					camera.position.copy(center).add(dir.multiplyScalar(Math.max(orthographicDistance, dist)));
				} else if (type == "Perspective") {
					camera = makePerspectiveCamera();
					camera.position.copy(center).add(dir.multiplyScalar(dist));
				}

				controls.setCamera(camera);

				render();
			}
		</script>
	</body>
</html>
