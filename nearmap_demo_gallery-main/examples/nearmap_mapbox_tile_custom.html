<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Add a raster tile source</title>
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
<link href="https://api.mapbox.com/mapbox-gl-js/v2.7.0/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v2.7.0/mapbox-gl.js"></script>
<script src="./keys.js"></script>

<style>
body { margin: 0; padding: 0; }
#map { position: absolute; top: 0; bottom: 0; width: 100%; }
</style>
</head>
<body>
<div id="map"></div>
<script>
	mapboxgl.accessToken = MAPBOX_KEY;
    const map = new mapboxgl.Map({
        container: 'map', // container ID
        style: {
            'version': 8,
            'sources': {
                'raster-tiles': {
                    'type': 'raster',
                    "tiles": [`https://api.nearmap.com/tiles/v3/Vert/{z}/{x}/{y}.jpg?tertiary=satellite&apikey=${NEARMAP_KEY}`],
                    'tileSize': 256,
                    'attribution': 'Map Tiles by Nearmap'
                }
            },
            'layers': [
                {
                    'id': 'simple-tiles',
                    'type': 'raster',
                    'source': 'raster-tiles',
                    'minzoom': 0,
                    'maxzoom': 22,
                }						
            ]
        },
        center: [-73.99855440078873, 40.7226242281274], // starting position
        zoom: 14 // starting zoom
    });

    // Log Nearmap Tile API requests
    map.on('sourcedata', (e) => {
        if (e.sourceId === 'raster-tiles' && e.sourceDataType === 'metadata') {
            console.log('Nearmap Tile API Request:', e.tile.coord);
        }
    });
</script>
</body>
</html>
